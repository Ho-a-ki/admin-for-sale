<!DOCTYPE html>
<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제품 DB · JUST 기획 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="db">

<!-- ── 로그인 오버레이 ── -->
<div id="auth-overlay" style="display:flex;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">
  <div style="background:white;padding:40px 36px;border-radius:12px;width:340px;box-shadow:0 8px 40px rgba(0,0,0,0.2);">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:28px;font-weight:900;color:#D2001A;letter-spacing:2px;">JUST</div>
      <div style="font-size:12px;color:#888;margin-top:4px;">기획 관리 시스템 로그인</div>
    </div>
    <input id="auth-email" type="email" placeholder="이메일" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:10px;box-sizing:border-box;">
    <input id="auth-pw" type="password" placeholder="비밀번호" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:14px;box-sizing:border-box;" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()" style="width:100%;padding:11px;background:#D2001A;color:white;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;">로그인</button>
    <div id="auth-error" style="color:#D2001A;font-size:11px;text-align:center;margin-top:10px;min-height:16px;"></div>
  </div>
</div>

<!-- ── 앱 ── -->
<div id="app-wrap" style="display:none;width:100%;min-height:100vh;">

<!-- ── 사이드바 ── -->
<aside class="sidebar">
  <div class="sidebar-overlay"></div>
  <div class="sidebar-inner">
    <div class="sidebar-logo">
      <div class="sidebar-logo-main">JUST</div>
      <div class="sidebar-logo-sub">기획 관리 시스템</div>
    </div>
    <nav>
      <div class="nav-group">
        <div class="nav-group-label">데이터</div>
        <div class="nav-item active" onclick="location.href='db.html'">제품 DB</div>
        <div class="nav-item" onclick="location.href='expiry.html'">유통기한 DB</div>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">기획</div>
        <div class="nav-item" onclick="location.href='index.html'">공구 채널</div>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">관리</div>
        <div class="nav-item" onclick="location.href='integrated.html'">통합 기획</div>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">고객</div>
        <div class="nav-item" onclick="location.href='cs.html'">CS 접수</div>
      </div>
    </nav>
  </div>
</aside>

<!-- ── 메인 ── -->
<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="topbarTitle">제품 DB</span>
    <span class="topbar-badge" id="topbarBadge"></span>
    <div class="spacer"></div>
    <span style="font-size:10px;color:var(--gray3);">JUST Korea · 유스트</span>
    <button onclick="doLogout()" style="margin-left:12px;padding:5px 12px;background:none;border:1px solid #ddd;border-radius:4px;font-size:10px;color:var(--gray2);cursor:pointer;">로그아웃</button>
  </div>
  <div class="content">

    <!-- ══ 제품 DB ══ -->
    <div id="page-db" class="page active">
      <div class="db-filters">
        <input type="text" class="inp-box search-box" id="dbSearch" placeholder="제품명 또는 코드 검색..." oninput="filterDB()">
        <select class="inp-box" id="dbCat" onchange="filterDB()" style="width:140px;">
          <option value="">전체 카테고리</option>
        </select>
        <select class="inp-box" id="dbAbc" onchange="filterDB()" style="width:90px;">
          <option value="">전체 등급</option>
          <option value="A">A등급</option>
          <option value="B">B등급</option>
          <option value="C">C등급</option>
        </select>
        <select class="inp-box" id="dbStatus" onchange="filterDB()" style="width:90px;">
          <option value="">전체 상태</option>
          <option value="활성">활성</option>
          <option value="품절">품절</option>
        </select>
        <span class="count-chip" id="dbCount">0건</span>
      </div>
      <div class="tbl-scroll">
        <table class="tbl">
          <thead>
            <tr>
              <th style="width:110px;cursor:pointer;user-select:none;" onclick="sortDB(0)">관리코드<span class="sort-ind" data-col="0"></span></th>
              <th style="cursor:pointer;user-select:none;" onclick="sortDB(1)">제품명<span class="sort-ind" data-col="1"></span></th>
              <th style="width:90px;cursor:pointer;user-select:none;" onclick="sortDB(2)">카테고리<span class="sort-ind" data-col="2"></span></th>
              <th style="width:40px;cursor:pointer;user-select:none;" onclick="sortDB(3)">등급<span class="sort-ind" data-col="3"></span></th>
              <th style="width:90px;text-align:right;cursor:pointer;user-select:none;" onclick="sortDB(4)">소비자가<span class="sort-ind" data-col="4"></span></th>
              <th style="width:70px;text-align:center;cursor:pointer;user-select:none;" onclick="sortDB(5)">상태<span class="sort-ind" data-col="5"></span></th>
            </tr>
          </thead>
          <tbody id="dbTbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script src="app.js"></script>

</div><!-- /app-wrap -->
</body></html>
