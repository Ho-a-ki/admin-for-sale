<!DOCTYPE html>
<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS 접수 · JUST 기획 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="cs">

<!-- ── 로그인 오버레이 ── -->
<div id="auth-overlay" style="display:flex;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">
  <div style="background:white;padding:40px 36px;border-radius:12px;width:340px;box-shadow:0 8px 40px rgba(0,0,0,0.2);">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:28px;font-weight:900;color:#D2001A;letter-spacing:2px;">JUST</div>
      <div style="font-size:12px;color:#888;margin-top:4px;">기획 관리 시스템 로그인</div>
    </div>
    <input id="auth-email" type="email" placeholder="이메일" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:10px;box-sizing:border-box;">
    <input id="auth-pw" type="password" placeholder="비밀번호" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:14px;box-sizing:border-box;" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()" style="width:100%;padding:11px;background:#D2001A;color:white;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;">로그인</button>
    <div id="auth-error" style="color:#D2001A;font-size:11px;text-align:center;margin-top:10px;min-height:16px;"></div>
  </div>
</div>

<!-- ── 앱 ── -->
<div id="app-wrap" style="display:none;width:100%;min-height:100vh;">

<!-- ── 사이드바 ── -->
<aside class="sidebar">
  <div class="sidebar-overlay"></div>
  <div class="sidebar-inner">
    <div class="sidebar-logo">
      <div class="sidebar-logo-main">JUST</div>
      <div class="sidebar-logo-sub">기획 관리 시스템</div>
    </div>
    <nav>
      <div class="nav-group">
        <div class="nav-group-label">데이터</div>
        <div class="nav-item" onclick="location.href='db.html'">제품 DB</div>
        <div class="nav-item" onclick="location.href='expiry.html'">유통기한 DB</div>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">기획</div>
        <div class="nav-item" onclick="location.href='index.html'">공구 채널</div>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">관리</div>
        <div class="nav-item" onclick="location.href='integrated.html'">통합 기획</div>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">고객</div>
        <div class="nav-item active" onclick="location.href='cs.html'">CS 접수</div>
      </div>
    </nav>
  </div>
</aside>

<!-- ── 메인 ── -->
<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="topbarTitle">CS 접수</span>
    <span class="topbar-badge" id="topbarBadge">EXAMPLE</span>
    <div class="spacer"></div>
    <span style="font-size:10px;color:var(--gray3);">JUST Korea · 유스트</span>
    <button onclick="doLogout()" style="margin-left:12px;padding:5px 12px;background:none;border:1px solid #ddd;border-radius:4px;font-size:10px;color:var(--gray2);cursor:pointer;">로그아웃</button>
  </div>
  <div class="content">

    <!-- ══ CS 접수 ══ -->
    <div id="page-cs" class="page active">

      <!-- [TEST] imgbb 이미지 로드 확인 -->
      <div style="background:#fff;border:1px solid var(--gray5);padding:14px;margin-bottom:14px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--gray3);margin-bottom:8px;">▶ IMGBB TEST</div>
        <img src="https://i.ibb.co/gMpcg99d/image.jpg" alt="상세 올케어 세트" border="0" style="max-width:100%;height:auto;display:block;">
      </div>

      <!-- 요약 카드 -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;">
        <div class="cs-stat">
          <div class="cs-stat-label">전체</div>
          <div class="cs-stat-value" id="csStatTotal">0</div>
        </div>
        <div class="cs-stat">
          <div class="cs-stat-label">접수</div>
          <div class="cs-stat-value" id="csStatNew" style="color:var(--gray2)">0</div>
        </div>
        <div class="cs-stat">
          <div class="cs-stat-label">처리중</div>
          <div class="cs-stat-value" id="csStatWip" style="color:var(--red)">0</div>
        </div>
        <div class="cs-stat">
          <div class="cs-stat-label">완료</div>
          <div class="cs-stat-value" id="csStatDone" style="color:var(--gray3)">0</div>
        </div>
      </div>

      <!-- 필터 + 신규 -->
      <div class="db-filters">
        <input type="text" class="inp-box search-box" id="csSearch" placeholder="고객명·내용·담당자 검색..." oninput="renderCS()">
        <select class="inp-box" id="csStatusFilter" onchange="renderCS()" style="width:110px;">
          <option value="">전체 상태</option>
          <option value="접수">접수</option>
          <option value="처리중">처리중</option>
          <option value="완료">완료</option>
        </select>
        <select class="inp-box" id="csChanFilter" onchange="renderCS()" style="width:120px;">
          <option value="">전체 채널</option>
          <option value="공구채널">공구채널</option>
          <option value="자사몰">자사몰</option>
          <option value="기타">기타</option>
        </select>
        <select class="inp-box" id="csTypeFilter" onchange="renderCS()" style="width:120px;">
          <option value="">전체 유형</option>
          <option value="배송">배송</option>
          <option value="제품불량">제품불량</option>
          <option value="교환">교환</option>
          <option value="환불">환불</option>
          <option value="기타">기타</option>
        </select>
        <span class="count-chip" id="csCount">0건</span>
        <div style="margin-left:auto;">
          <button class="btn btn-red btn-sm" onclick="openCSForm()">+ 신규 접수</button>
        </div>
      </div>

      <!-- 신규/편집 폼 -->
      <div id="csFormWrap" style="display:none;background:#fff;border:1px solid var(--gray5);padding:16px;margin-bottom:14px;">
        <div style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--gray2);margin-bottom:10px;" id="csFormTitle">신규 CS 접수</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;">
          <input type="date" class="inp-box" id="csF_date">
          <select class="inp-box" id="csF_channel">
            <option value="공구채널">공구채널</option>
            <option value="자사몰">자사몰</option>
            <option value="기타">기타</option>
          </select>
          <input type="text" class="inp-box" id="csF_customer" placeholder="고객/인플루언서명">
          <input type="text" class="inp-box" id="csF_contact" placeholder="연락처 (선택)">
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;">
          <select class="inp-box" id="csF_type">
            <option value="배송">배송</option>
            <option value="제품불량">제품불량</option>
            <option value="교환">교환</option>
            <option value="환불">환불</option>
            <option value="기타">기타</option>
          </select>
          <input type="text" class="inp-box" id="csF_assignee" placeholder="담당자">
          <select class="inp-box" id="csF_status">
            <option value="접수">접수</option>
            <option value="처리중">처리중</option>
            <option value="완료">완료</option>
          </select>
        </div>
        <textarea class="inp-box" id="csF_desc" placeholder="문의 내용" style="width:100%;min-height:60px;box-sizing:border-box;margin-bottom:8px;font-family:inherit;"></textarea>
        <textarea class="inp-box" id="csF_memo" placeholder="처리 메모 (내부용)" style="width:100%;min-height:50px;box-sizing:border-box;margin-bottom:10px;font-family:inherit;"></textarea>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button class="btn btn-ghost btn-sm" onclick="closeCSForm()">취소</button>
          <button class="btn btn-black btn-sm" onclick="saveCS()">저장</button>
        </div>
      </div>

      <!-- 테이블 -->
      <div class="tbl-scroll">
        <table class="tbl">
          <thead>
            <tr>
              <th style="width:90px">접수일</th>
              <th style="width:80px">채널</th>
              <th style="width:130px">고객/인플루언서</th>
              <th style="width:80px">유형</th>
              <th>문의 내용</th>
              <th style="width:90px">담당자</th>
              <th style="width:80px;text-align:center">상태</th>
              <th style="width:120px;text-align:center">변경</th>
              <th style="width:50px;text-align:center">삭제</th>
            </tr>
          </thead>
          <tbody id="csTbody"></tbody>
        </table>
      </div>

      <!-- 상세 모달 -->
      <div id="csDetailModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;">
        <div style="background:white;width:560px;max-height:80vh;overflow-y:auto;padding:24px;position:relative;">
          <button onclick="closeCSDetail()" style="position:absolute;top:12px;right:12px;border:none;background:none;font-size:20px;cursor:pointer;color:var(--gray2);">×</button>
          <div id="csDetailContent"></div>
        </div>
      </div>

    </div>

  </div>
</div>

<script src="app.js"></script>

</div><!-- /app-wrap -->
</body></html>
