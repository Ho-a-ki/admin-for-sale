<!DOCTYPE html>
<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유통기한 DB · JUST 기획 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="expiry">

<!-- ── 로그인 오버레이 ── -->
<div id="auth-overlay" style="display:flex;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">
  <div style="background:white;padding:40px 36px;border-radius:12px;width:340px;box-shadow:0 8px 40px rgba(0,0,0,0.2);">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:28px;font-weight:900;color:#D2001A;letter-spacing:2px;">JUST</div>
      <div style="font-size:12px;color:#888;margin-top:4px;">기획 관리 시스템 로그인</div>
    </div>
    <input id="auth-email" type="email" placeholder="이메일" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:10px;box-sizing:border-box;">
    <input id="auth-pw" type="password" placeholder="비밀번호" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:14px;box-sizing:border-box;" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()" style="width:100%;padding:11px;background:#D2001A;color:white;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;">로그인</button>
    <div id="auth-error" style="color:#D2001A;font-size:11px;text-align:center;margin-top:10px;min-height:16px;"></div>
  </div>
</div>

<!-- ── 앱 ── -->
<div id="app-wrap" style="display:none;width:100%;min-height:100vh;">

<!-- ── 사이드바 ── -->
<aside class="sidebar">
  <div class="sidebar-overlay"></div>
  <div class="sidebar-inner">
    <div class="sidebar-logo">
      <div class="sidebar-logo-main">JUST</div>
      <div class="sidebar-logo-sub">기획 관리 시스템</div>
    </div>
    <nav>
      <div class="nav-group">
        <div class="nav-group-label">데이터</div>
        <div class="nav-item" onclick="location.href='db.html'">제품 DB</div>
        <div class="nav-item active" onclick="location.href='expiry.html'">유통기한 DB</div>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">기획</div>
        <div class="nav-item" onclick="location.href='index.html'">공구 채널</div>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">관리</div>
        <div class="nav-item" onclick="location.href='integrated.html'">통합 기획</div>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">고객</div>
        <div class="nav-item" onclick="location.href='cs.html'">CS 접수</div>
      </div>
    </nav>
  </div>
</aside>

<!-- ── 메인 ── -->
<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="topbarTitle">유통기한 DB</span>
    <span class="topbar-badge" id="topbarBadge"></span>
    <div class="spacer"></div>
    <span style="font-size:10px;color:var(--gray3);">JUST Korea · 유스트</span>
    <button onclick="doLogout()" style="margin-left:12px;padding:5px 12px;background:none;border:1px solid #ddd;border-radius:4px;font-size:10px;color:var(--gray2);cursor:pointer;">로그아웃</button>
  </div>
  <div class="content">

    <!-- ══ 유통기한 DB ══ -->
    <div id="page-expiry" class="page active">
      <div class="db-controls">
        <input type="text" class="inp-box search-box" id="expSearch" placeholder="제품명 또는 코드 검색..." oninput="filterExpiry()" style="width:220px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:11px;color:var(--gray2);white-space:nowrap;">이후 유통기한</span>
          <input type="text" class="inp-box" id="expDateFilter" placeholder="예) 2026 04" oninput="filterExpiry()" style="width:110px;">
        </div>
        <select class="inp-box" id="expFilter" onchange="filterExpiry()" style="width:120px;">
          <option value="">전체</option>
          <option value="danger">3개월 이내</option>
          <option value="warn">6개월 이내</option>
          <option value="ok">6개월 이상</option>
        </select>
        <span class="count-chip" id="expCount">0건</span>
      </div>
      <div class="tbl-scroll">
        <table class="tbl">
          <thead>
            <tr>
              <th style="width:110px">관리코드</th>
              <th>제품명</th>
              <th style="width:120px;text-align:center">유통기한</th>
              <th style="width:80px;text-align:center">재고수량</th>
              <th style="width:80px;text-align:center">상태</th>
            </tr>
          </thead>
          <tbody id="expTbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script src="app.js"></script>

</div><!-- /app-wrap -->
</body></html>
